<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Controle de Chips PRO V4</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px
}

h1{text-align:center}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border:none;
border-radius:6px;
background:#1e293b;
color:white
}

button{
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
background:#facc15;
margin-top:5px
}

.board{
display:flex;
gap:10px;
overflow-x:auto
}

.column{
background:#1e293b;
padding:10px;
border-radius:10px;
min-width:250px
}

.card{
background:#334155;
padding:8px;
border-radius:8px;
margin-bottom:8px
}

.delete{background:#ef4444}
.whats{background:#22c55e}

.login{
max-width:300px;
margin:auto
}

.dashboard{
background:#1e293b;
padding:10px;
border-radius:10px;
margin-bottom:10px
}

</style>

</head>

<body>

<div id="login">

<h1>Login Sistema</h1>

<div class="login">

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

</div>

<div id="sistema" style="display:none">

<h1>Controle de Chips PRO V4</h1>

<button onclick="logout()">Sair</button>

<input id="busca" placeholder="Buscar chip, cliente ou operadora">

<button onclick="novoChip()">Adicionar Chip</button>

<div class="dashboard">

<canvas id="grafico"></canvas>

</div>

<div class="board" id="board"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,onSnapshot }

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged }

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {

apiKey:"SUA_API",
authDomain:"SEU_DOMINIO",
projectId:"SEU_PROJETO"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const auth=getAuth(app);

let etapas=["Em Estoque","Em Uso","Retirado","Perdido"];

let dados={};

etapas.forEach(e=>dados[e]=[]);

window.login=function(){

let email=document.getElementById("email").value;

let senha=document.getElementById("senha").value;

signInWithEmailAndPassword(auth,email,senha)

}

window.logout=function(){

signOut(auth)

}

onAuthStateChanged(auth,user=>{

if(user){

document.getElementById("login").style.display="none";

document.getElementById("sistema").style.display="block";

carregar();

}

else{

document.getElementById("login").style.display="block";

document.getElementById("sistema").style.display="none";

}

});

function carregar(){

onSnapshot(collection(db,"chips"),snap=>{

etapas.forEach(e=>dados[e]=[]);

snap.forEach(d=>{

let chip=d.data();

chip.id=d.id;

dados[chip.status].push(chip);

});

render();

});

}

function render(){

let busca=document.getElementById("busca").value?.toLowerCase()||"";

let board=document.getElementById("board");

board.innerHTML="";

etapas.forEach(etapa=>{

let col=document.createElement("div");

col.className="column";

col.innerHTML=`<h3>${etapa}</h3>`;

dados[etapa]

.filter(c=>(c.numero+c.cliente+c.operadora).toLowerCase().includes(busca))

.forEach(chip=>{

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<strong>${chip.numero}</strong>

<input value="${chip.cliente||""}" 
oninput="editar('${chip.id}','cliente',this.value)">

<input value="${chip.operadora||""}"
oninput="editar('${chip.id}','operadora',this.value)">

<select onchange="editar('${chip.id}','status',this.value)">

<option ${chip.status=="Em Estoque"?"selected":""}>Em Estoque</option>
<option ${chip.status=="Em Uso"?"selected":""}>Em Uso</option>
<option ${chip.status=="Retirado"?"selected":""}>Retirado</option>
<option ${chip.status=="Perdido"?"selected":""}>Perdido</option>

</select>

<button class="whats" onclick="whats('${chip.numero}')">WhatsApp</button>

<button class="delete" onclick="remover('${chip.id}')">Excluir</button>

`;

col.appendChild(card);

});

board.appendChild(col);

});

grafico();

}

window.editar=async function(id,campo,valor){

await updateDoc(doc(db,"chips",id),{[campo]:valor});

}

window.remover=async function(id){

if(confirm("Excluir chip?"))

await deleteDoc(doc(db,"chips",id));

}

window.novoChip=async function(){

let numero=prompt("Número do chip");

await addDoc(collection(db,"chips"),{

numero:numero,

cliente:"",

operadora:"",

status:"Em Estoque"

});

}

window.whats=function(numero){

window.open(`https://wa.me/?text=Olá estou verificando o chip ${numero}`);

}

function grafico(){

let dadosGraf=etapas.map(e=>dados[e].length);

new Chart(document.getElementById("grafico"),{

type:"pie",

data:{

labels:etapas,

datasets:[{data:dadosGraf}]

}

});

}

document.addEventListener("input",render);

</script>

</body>
</html>
