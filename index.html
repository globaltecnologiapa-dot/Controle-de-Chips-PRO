<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Chips PRO - Global Rastreamento</title>

<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0;padding:10px}
h1{text-align:center;font-size:18px;margin-bottom:10px}
.status{background:#1e293b;padding:8px;border-radius:8px;text-align:center;margin-bottom:10px;font-size:12px}
.board{display:flex;gap:10px;overflow-x:auto;padding-bottom:20px}
.column{background:#1e293b;padding:10px;border-radius:12px;min-width:260px;max-width:260px;flex-shrink:0}
@media(max-width:768px){.column{min-width:75vw;max-width:75vw}}
.column h3{text-align:center;font-size:14px;margin:5px 0}
.counter{font-size:12px;text-align:center;margin-bottom:8px;color:#facc15}
.card{background:#334155;padding:8px;border-radius:8px;margin-bottom:8px;font-size:13px}
button{padding:6px;border:none;border-radius:6px;cursor:pointer;font-size:12px;width:100%;margin-top:5px}
.add-btn{background:#facc15;font-weight:bold}
.small-btn{background:#22c55e;margin-top:3px}
.delete-btn{background:#ef4444;margin-top:3px}
input, select, textarea{width:100%;padding:6px;margin-top:5px;border-radius:6px;border:none;font-size:12px;background:#1e293b;color:#fff}
textarea{height:50px}
.top-links{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:15px}
</style>
</head>
<body>

<h1>Controle de Chips PRO - Global Rastreamento</h1>
<div class="status" id="status">🔄 Conectando ao Firebase...</div>

<div class="top-links">
<button class="add-btn" onclick="adicionarChip()">Adicionar Chip</button>
<button class="add-btn" onclick="exportarPDF()">📄 Exportar PDF</button>
<button class="add-btn" onclick="mostrarDashboard()">📊 Dashboard</button>
</div>

<div class="board" id="board"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_DOMINIO.firebaseapp.com",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_BUCKET.appspot.com",
  messagingSenderId: "SEU_ID",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let etapas = ["Em Estoque","Em Uso","Retirado","Perdido","Aguardando Ativação"];
const dados = {};
etapas.forEach(e=>dados[e]=[]);

function criarBoard(dados){
  const board = document.getElementById("board");
  board.innerHTML = "";

  etapas.forEach(etapa=>{
    let col = document.createElement("div");
    col.className="column";

    let titulo=document.createElement("h3");
    titulo.innerText=etapa;
    col.appendChild(titulo);

    let contador=document.createElement("div");
    contador.className="counter";
    contador.innerText="Total: "+(dados[etapa]?.length||0);
    col.appendChild(contador);

    (dados[etapa]||[]).forEach(chip=>{
      let card=document.createElement("div");
      card.className="card";

      card.innerHTML=`
<strong>${chip.numero||"Sem número"}</strong>

<textarea placeholder="Observações" 
oninput="editarObservacao('${chip.id}',this.value)">${chip.observacao||""}</textarea>

<input type="text" placeholder="Cliente vinculado"
value="${chip.cliente||""}"
oninput="editarCliente('${chip.id}',this.value)">

<select onchange="alterarStatus('${chip.id}',this.value)">
<option value="Em Estoque" ${chip.status==="Em Estoque"?"selected":""}>Em Estoque</option>
<option value="Em Uso" ${chip.status==="Em Uso"?"selected":""}>Em Uso</option>
<option value="Retirado" ${chip.status==="Retirado"?"selected":""}>Retirado</option>
<option value="Perdido" ${chip.status==="Perdido"?"selected":""}>Perdido</option>
<option value="Aguardando Ativação" ${chip.status==="Aguardando Ativação"?"selected":""}>Aguardando Ativação</option>
</select>

<input type="text" placeholder="Operadora"
value="${chip.operadora||""}"
oninput="editarOperadora('${chip.id}',this.value)">

<input type="text" placeholder="Fornecedor"
value="${chip.fornecedor||""}"
oninput="editarFornecedor('${chip.id}',this.value)">

<button class="delete-btn" onclick="removerChip('${chip.id}')">Excluir</button>
<button class="small-btn" onclick="copiarMensagem('${chip.id}')">Copiar Msg WhatsApp</button>

<textarea id="msg-${chip.id}" style="display:none;">
Olá! Estou entrando em contato sobre o chip ${chip.numero}
</textarea>
`;

      col.appendChild(card);
    });

    board.appendChild(col);
  });
}

async function adicionarChip(){
  let numero = prompt("Número do chip / ICCID:");
  if(!numero) return;

  await addDoc(collection(db,"chips"),{
    numero:numero,
    status:"Em Estoque",
    cliente:"",
    operadora:"",
    fornecedor:"",
    observacao:""
  });
}

async function editarObservacao(id,texto){ await updateDoc(doc(db,"chips",id),{observacao:texto}); }
async function editarCliente(id,texto){ await updateDoc(doc(db,"chips",id),{cliente:texto}); }
async function editarOperadora(id,texto){ await updateDoc(doc(db,"chips",id),{operadora:texto}); }
async function editarFornecedor(id,texto){ await updateDoc(doc(db,"chips",id),{fornecedor:texto}); }
async function alterarStatus(id,status){ await updateDoc(doc(db,"chips",id),{status:status}); }

async function removerChip(id){
 if(confirm("Deseja realmente remover este chip?")){
   await deleteDoc(doc(db,"chips",id));
 }
}

function copiarMensagem(id){
 let msg=document.getElementById(`msg-${id}`);
 navigator.clipboard.writeText(msg.value);
 alert("Mensagem copiada para WhatsApp!");
}

function mostrarDashboard(){
 let resumo = etapas.map(e=>`${e}: ${dados[e]?.length||0}`).join(" | ");
 alert("📊 Dashboard:\n"+resumo);
}

function exportarPDF(){
 import("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js")
 .then(({ jsPDF })=>{
   const docPDF = new jsPDF();
   let y=10;

   etapas.forEach(etapa=>{
     docPDF.text(`${etapa}: ${dados[etapa]?.length||0}`,10,y);
     y+=8;

     (dados[etapa]||[]).forEach(chip=>{
       docPDF.text(`- ${chip.numero} | Cliente: ${chip.cliente||''} | Status: ${chip.status}`,12,y);
       y+=6;
     });

     y+=6;
   });

   docPDF.save("controle_chips.pdf");
 });
}

onSnapshot(collection(db,"chips"),(snapshot)=>{

 etapas.forEach(e=>dados[e]=[]);

 snapshot.forEach(docSnap=>{
   let chip = docSnap.data();
   chip.id = docSnap.id;

   if(!dados[chip.status]) dados[chip.status]=[];
   dados[chip.status].push(chip);
 });

 criarBoard(dados);

 document.getElementById("status").innerText =
 "✅ Conectado ao Firebase - Dados sincronizados";

});
</script>

</body>
</html>
