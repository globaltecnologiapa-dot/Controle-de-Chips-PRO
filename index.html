<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Controle de Chips PRO V5 ULTRA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center
}

h1{font-size:18px;margin:0}

.container{padding:20px}

input,select{
width:100%;
padding:8px;
margin-top:5px;
border:none;
border-radius:6px;
background:#1e293b;
color:white
}

button{
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:5px
}

.add{background:#facc15}
.delete{background:#ef4444}
.whats{background:#22c55e}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:20px
}

.stat{
background:#1e293b;
padding:15px;
border-radius:10px;
text-align:center
}

.board{
display:flex;
gap:10px;
overflow-x:auto
}

.column{
background:#1e293b;
padding:10px;
border-radius:10px;
min-width:260px
}

.card{
background:#334155;
padding:8px;
border-radius:8px;
margin-bottom:8px
}

.login{
max-width:300px;
margin:auto;
margin-top:100px
}

canvas{
background:#1e293b;
padding:10px;
border-radius:10px
}

</style>

</head>

<body>

<div id="login">

<div class="login">

<h1>Login Sistema</h1>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

</div>

<div id="sistema" style="display:none">

<header>

<h1>Controle de Chips PRO V5 ULTRA</h1>

<button onclick="logout()">Sair</button>

</header>

<div class="container">

<input id="busca" placeholder="Buscar chip, cliente ou operadora">

<button class="add" onclick="novoChip()">Adicionar Chip</button>

<div class="cards">

<div class="stat">
<div>Total Chips</div>
<strong id="t1">0</strong>
</div>

<div class="stat">
<div>Em Uso</div>
<strong id="t2">0</strong>
</div>

<div class="stat">
<div>Estoque</div>
<strong id="t3">0</strong>
</div>

<div class="stat">
<div>Perdidos</div>
<strong id="t4">0</strong>
</div>

</div>

<canvas id="graficoStatus"></canvas>

<br><br>

<canvas id="graficoOperadora"></canvas>

<br><br>

<div class="board" id="board"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getFirestore,collection,addDoc,updateDoc,deleteDoc,doc,onSnapshot }

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged }

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyApCbQJCUQSwP0g6vSBqwrIMSK7n-w9ILc",
  authDomain: "global-tecnologia-kanban.firebaseapp.com",
  projectId: "global-tecnologia-kanban",
  storageBucket: "global-tecnologia-kanban.firebasestorage.app",
  messagingSenderId: "526527534352",
  appId: "1:526527534352:web:22b874f8029b3cd4c48195",
  measurementId: "G-MX3QFXSL04"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const auth=getAuth(app);

let etapas=["Em Estoque","Em Uso","Retirado","Perdido"];

let dados={};

let chart1;
let chart2;

etapas.forEach(e=>dados[e]=[]);

window.login=function(){

let email=document.getElementById("email").value;

let senha=document.getElementById("senha").value;

signInWithEmailAndPassword(auth,email,senha);

}

window.logout=function(){

signOut(auth);

}

onAuthStateChanged(auth,user=>{

if(user){

login.style.display="none";

sistema.style.display="block";

carregar();

}

else{

login.style.display="block";

sistema.style.display="none";

}

});

function carregar(){

onSnapshot(collection(db,"chips"),snap=>{

etapas.forEach(e=>dados[e]=[]);

snap.forEach(d=>{

let chip=d.data();

chip.id=d.id;

if(!dados[chip.status])dados[chip.status]=[];

dados[chip.status].push(chip);

});

render();

});

}

function render(){

let busca=document.getElementById("busca").value?.toLowerCase()||"";

let board=document.getElementById("board");

board.innerHTML="";

let total=0;

let uso=0;

let estoque=0;

let perdido=0;

etapas.forEach(etapa=>{

let col=document.createElement("div");

col.className="column";

col.innerHTML=`<h3>${etapa}</h3>`;

dados[etapa]

.filter(c=>((c.numero||"")+(c.cliente||"")+(c.operadora||"")).toLowerCase().includes(busca))

.forEach(chip=>{

total++;

if(chip.status=="Em Uso")uso++;

if(chip.status=="Em Estoque")estoque++;

if(chip.status=="Perdido")perdido++;

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<strong>${chip.numero}</strong>

<input value="${chip.cliente||""}" 
oninput="editar('${chip.id}','cliente',this.value)">

<input value="${chip.operadora||""}"
oninput="editar('${chip.id}','operadora',this.value)">

<select onchange="editar('${chip.id}','status',this.value)">

<option ${chip.status=="Em Estoque"?"selected":""}>Em Estoque</option>
<option ${chip.status=="Em Uso"?"selected":""}>Em Uso</option>
<option ${chip.status=="Retirado"?"selected":""}>Retirado</option>
<option ${chip.status=="Perdido"?"selected":""}>Perdido</option>

</select>

<button class="whats" onclick="whats('${chip.numero}')">WhatsApp</button>

<button class="delete" onclick="remover('${chip.id}')">Excluir</button>

`;

col.appendChild(card);

});

board.appendChild(col);

});

document.getElementById("t1").innerText=total;
document.getElementById("t2").innerText=uso;
document.getElementById("t3").innerText=estoque;
document.getElementById("t4").innerText=perdido;

grafico();

}

window.editar=async function(id,campo,valor){

await updateDoc(doc(db,"chips",id),{[campo]:valor});

}

window.remover=async function(id){

if(confirm("Excluir chip?"))

await deleteDoc(doc(db,"chips",id));

}

window.novoChip=async function(){

let numero=prompt("Número do chip");

await addDoc(collection(db,"chips"),{

numero:numero,

cliente:"",

operadora:"",

status:"Em Estoque"

});

}

window.whats=function(numero){

window.open(`https://wa.me/?text=Verificando chip ${numero}`);

}

function grafico(){

let dadosGraf=etapas.map(e=>dados[e].length);

if(chart1)chart1.destroy();

chart1=new Chart(document.getElementById("graficoStatus"),{

type:"pie",

data:{

labels:etapas,

datasets:[{data:dadosGraf}]

}

});

let operadoras={};

Object.values(dados).flat().forEach(c=>{

let op=c.operadora||"Sem";

if(!operadoras[op])operadoras[op]=0;

operadoras[op]++;

});

if(chart2)chart2.destroy();

chart2=new Chart(document.getElementById("graficoOperadora"),{

type:"bar",

data:{

labels:Object.keys(operadoras),

datasets:[{data:Object.values(operadoras)}]

}

});

}

document.addEventListener("input",render);

</script>

</body>
</html>
